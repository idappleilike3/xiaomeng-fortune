<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>付款完成｜Erosée 情感解碼</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="legal-page">
      <section class="legal-card">
        <p class="eyebrow">Payment Success</p>
        <h1>付款成功</h1>
        <p>謝謝你支持情感解碼。藍新金流已完成授權，訂單狀態會同步到對話通知。</p>
        <p id="orderLine" hidden></p>
        <a class="button primary" href="./erosee-l2-pricing.html">回到方案頁</a>
        <a class="button" href="./index.html">回到首頁</a>
      </section>
    </main>
    <script>
      (function () {
        const order = new URLSearchParams(location.search).get("order");
        if (!order) return;
        const el = document.getElementById("orderLine");
        el.hidden = false;
        el.textContent = "訂單編號：" + order;
      })();
    </script>
  </body>
</html>
